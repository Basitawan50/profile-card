<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile Card</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="card">

        <header class="profile-header">

            <img src="images/profile.png" alt="Muhammad Abdul Basit">

            <h1>Muhammad Abdul Basit</h1>

            <p>Frontend Web Development Intern</p>

        </header>

        <section class="about">

            <h2>About Me</h2>

            <p>
                I am a Computer Science graduate passionate about Frontend Web Development.
                I enjoy creating responsive websites and continuously improving my HTML, CSS,
                JavaScript, and problem-solving skills.
            </p>

        </section>

        <footer class="social-links">

            <h3>Connect With Me</h3>

            <a href="https://github.com/Basitawan50" target="_blank">
                <i class="fa-brands fa-github"></i>
                GitHub
            </a>

            <a href="https://www.linkedin.com/in/YOUR-LINKEDIN" target="_blank">
                <i class="fa-brands fa-linkedin"></i>
                LinkedIn
            </a>

            <a href="mailto:your@email.com">
                <i class="fa-solid fa-envelope"></i>
                Email
            </a>

        </footer>

    </main>

</body>

</html>
